[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/supernova"]

[project]
name = "supernova"
version = "0.1.0"
description = "AI Agent Evaluation Pipeline — batch inference, deterministic scorers, LLM-as-judge, MLflow tracking"
readme = "README.md"
requires-python = ">=3.12,<3.14"
dependencies = [
    # --- LLM / agents ---
    "openai-agents[litellm]>=0.10,<1",
    "openai>=2.0,<3",
    "litellm>=1.83,<2",
    "tiktoken>=0.12,<1",

    # --- Tracking ---
    "mlflow>=3.11,<4",

    # --- Config / runtime ---
    "pydantic>=2.10,<3",
    "pydantic-settings>=2.10,<3",
    "typer>=0.15,<1",
    "rich>=13,<16",
    "structlog>=25,<26",
    "python-dotenv>=1,<2",
    "jinja2>=3.1,<4",

    # --- Data ---
    "numpy>=2,<3",
    "pandas>=2.3.3,<3",
    "datasets>=2.14,<5",

    # --- Storage / ops ---
    "psycopg2-binary>=2.9,<3",
    "boto3>=1.40,<2",
    "dvc>=3.60,<4",
    "dvc-s3>=3,<4",

    # --- NLP utilities ---
    "python-Levenshtein>=0.27,<1",
    "lingua-language-detector>=2.2,<3",
    "nltk>=3.9,<4",
    "gepa>=0.1.1,<1",

    # --- Compatibility shims (temporary, see notes) ---
    # protobuf>=5 removes google.protobuf.service used by some transitive deps.
    "protobuf>=4.25,<5",
    # setuptools>=81 removes pkg_resources. Track upstream callers; remove when clear.
    "setuptools<81",
]

[project.scripts]
supernova = "supernova.infrastructure.cli:app"

[dependency-groups]
dev = [
    "autoflake>=2.3.3",
    "black>=26.3.1",
    "isort>=8.0.1",
    "pre-commit>=4.5.1",
    "pytest>=9.0.3",
    "pytest-asyncio>=1.3.0",
    "pytest-cov>=7.1.0",
    "vulture>=2.16",
]

[tool.black]
line-length = 100
target-version = ["py312", "py313"]

[tool.isort]
profile = "black"
line_length = 100
known_first_party = ["supernova"]

[tool.vulture]
min_confidence = 80
paths = ["src/supernova"]

[tool.autoflake]
remove-all-unused-imports = true
remove-unused-variables = true

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = "-v --tb=short"

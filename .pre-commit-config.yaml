repos:
  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
        language_version: python3

  - repo: https://github.com/pycqa/isort
    rev: 6.0.1
    hooks:
      - id: isort

  - repo: https://github.com/PyCQA/autoflake
    rev: v2.3.1
    hooks:
      - id: autoflake
        args:
          - --remove-all-unused-imports
          - --remove-unused-variables
          - --in-place

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy src/camel/
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true

      - id: vulture
        name: vulture
        entry: uv run vulture --min-confidence 80 src/camel/ vulture_whitelist.py
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true

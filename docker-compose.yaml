services:
  postgres:
    image: postgres:16-alpine
    env_file: .env
    ports:
      - "${POSTGRES_PORT:-5462}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mlflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mlflow}
      POSTGRES_DB: ${POSTGRES_DB:-mlflow}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mlflow} -d ${POSTGRES_DB:-mlflow}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - eval-network

  minio:
    image: minio/minio:latest
    env_file: .env
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - eval-network

  minio-init:
    image: minio/mc:latest
    env_file: .env
    depends_on:
      minio:
        condition: service_healthy
    restart: on-failure:5
    entrypoint: >-
      sh -c "
        sleep 2 &&
        mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
        mc mb --ignore-existing local/$${BUCKET_NAME} &&
        echo 'Bucket ready'
      "
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
      BUCKET_NAME: ${MLFLOW_BUCKET:-mlflow-artifacts}
    networks:
      - eval-network

  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.11.1
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "${MLFLOW_PORT:-5000}:5000"
    command:
      - bash
      - -c
      - |
        pip install -q psycopg2-binary boto3 &&
        mlflow server \
          --host 0.0.0.0 \
          --port 5000 \
          --backend-store-uri postgresql://${POSTGRES_USER:-mlflow}:${POSTGRES_PASSWORD:-mlflow}@postgres:5432/${POSTGRES_DB:-mlflow} \
          --serve-artifacts \
          --default-artifact-root s3://${MLFLOW_BUCKET:-mlflow-artifacts}/ \
          --allowed-hosts "*" \
          --cors-allowed-origins "*"
    volumes:
      - mlflow-data:/mlflow
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
      AWS_DEFAULT_REGION: ${AWS_REGION:-us-east-1}
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      SQLALCHEMY_POOL_SIZE: ${SQLALCHEMY_POOL_SIZE:-30}
      SQLALCHEMY_POOL_RECYCLE: ${SQLALCHEMY_POOL_RECYCLE:-30}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - eval-network

  eval:
    build: .
    env_file: .env
    depends_on:
      mlflow:
        condition: service_healthy
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
      AWS_DEFAULT_REGION: ${AWS_REGION:-us-east-1}
    volumes:
      - ./data:/app/data:ro
      - ./results:/app/results
    networks:
      - eval-network

volumes:
  mlflow-data:
  postgres-data:
  minio-data:

networks:
  eval-network:
    driver: bridge
